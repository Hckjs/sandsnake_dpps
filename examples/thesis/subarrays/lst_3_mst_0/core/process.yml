ProcessorTool:
  force_recompute_dl1: false
  force_recompute_dl2: true

EventSource:
  allowed_tels: [1, 4, 3]

SoftwareTrigger:
  # require at least two telescopes after subarray selection
  # necessary since simulations only require two telescopes triggered
  # in the hyper-array
  min_telescopes: 2
  # LST hardware stereo trigger requires at least 2 LSTs present.
  # Remove single LST telescope event from subarray event.
  min_telescopes_of_type:
    - ["type", "*", 0]
    - ["type", "LST*", 2]

DataWriter:
  Contact:
    name: Jonas Hackfeld
    email: Jonas.Hackfeld@ruhr-uni-bochum.de
    organization: RUB

  Instrument:
    site: CTAO-North
    class_: Subarray
    id_: alpha
    version: Prod6

  overwrite: true # do not overwrite existing files
  write_dl1_images: false # store DL1 images
  write_dl1_parameters: true # store DL1 parameters
  write_dl2: true # store DL2 stereo geometry
  write_r0_waveforms: false # write R0 waveforms
  write_r1_waveforms: false # write R1 waveforms
  write_muon_parameters: false # analyze and write muon parameters

CameraCalibrator:
  image_extractor_type: # PROD6 uses NPWS
    - ["type", "*", "NeighborPeakWindowSum"]
    - ["type", "*FlashCam", "FlashCamExtractor"]

  LocalPeakWindowSum: # LST currently uses LPWS
    window_width: 7
    window_shift: 3
    apply_integration_correction: true

ImageProcessor:
  use_telescope_frame: true

  apply_image_modifier: false
  ImageModifier:
    psf_smear_factor: 0
    noise_transition_charge: 0
    noise_bias_dim_pixels: 0
    noise_level_dim_pixels: 0
    noise_level_bright_pixels: 0
    noise_correct_bias: 0

  image_cleaner_type: NSBImageCleaner
  NSBImageCleaner:
    time_limit: 2
    time_num_neighbors: 1
    bright_cleaning_n_pixels: 3
    bright_cleaning_fraction: 0.03
    bright_cleaning_threshold: 267
    largest_island_only: false
    pedestal_factor: 2.5

    TailcutsImageCleaner:
      picture_threshold_pe: # top-level threshold in photoelectrons
        - [type, "LST*", 8.5]
        - [type, "MST*NectarCam", 9.0]
        - [type, "MST*FlashCam", 9.0]
      boundary_threshold_pe: # second-level threshold in photoelectrons
        - [type, "LST*", 4.25]
        - [type, "MST*NectarCam", 4.5]
        - [type, "MST*FlashCam", 4.5]
      keep_isolated_pixels: false # If False, pixels with  < min_picture_neighbors are removed.
      min_picture_neighbors: 2 # Minimum number of neighbors above threshold to consider

  ImageQualityQuery:
    # quality criteria should be a list of pairs of [name, filter_expression]
    # The filter expression should contain the variable `image` which is the
    # image itself, a 1D np.array.
    quality_criteria:
      - ["enough_pixels", "np.count_nonzero(image) > 2"]
      - ["enough_charge", "image.sum() > 50"]

ShowerProcessor:
  # choose between HillasReconstructor and HillasIntersection or both (two
  # implementations of the standard stereo line-intersection method)
  reconstructor_types:
    - HillasReconstructor

  HillasReconstructor:
    # Choose which telescope events should be included in the reconstruction.
    StereoQualityQuery:
      # the quality criteria here should again be a list of [name,
      # filter_expression] pairs, filter_expression contains the variable
      # `parameters` which is a `ctapipe.containers.ImageParametersContainer`
      # for the current event
      quality_criteria:
        - [enough intensity, "parameters.hillas.intensity > 50"]
        - [Positive width, "parameters.hillas.width.value > 0"]
        - [enough pixels, "parameters.morphology.n_pixels > 3"]
        - [not clipped, "parameters.leakage.intensity_width_2 < 0.5"]
